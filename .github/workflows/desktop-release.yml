name: CD For SiYuan Shared
on:
  workflow_dispatch:
    inputs:
      version:
        description: "release version/tag (for release asset naming)"
        required: true
      packageManager:
        description: "pnpm@x.x.x"
        required: true

permissions:
  contents: write

env:
  BUILD_ARGS: "-s -w -X github.com/siyuan-note/siyuan/kernel/util.Mode=prod"

jobs:
  build-kernel:
    runs-on: arc-runner-set
    container: ghcr.io/goreleaser/goreleaser-cross:latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          set-safe-directory: true

      - name: Build libkernel linux/amd64
        run: go build -buildmode=c-archive -buildvcs=false --tags fts5 -o "../app/native/linux-amd64/libkernel.a" -ldflags "$BUILD_ARGS" ./cshared/
        working-directory: kernel
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
          CC: x86_64-linux-gnu-gcc

      - name: Build libkernel linux/arm64
        run: go build -buildmode=c-archive -buildvcs=false --tags fts5 -o "../app/native/linux-arm64/libkernel.a" -ldflags "$BUILD_ARGS" ./cshared/
        working-directory: kernel
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc

      - name: Build libkernel darwin/amd64
        run: go build -buildmode=c-archive -buildvcs=false --tags fts5 -o "../app/native/darwin-amd64/libkernel.a" -ldflags "$BUILD_ARGS" ./cshared/
        working-directory: kernel
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: amd64
          CC: /usr/local/osxcross/bin/x86_64-apple-darwin25-cc

      - name: Build libkernel darwin/arm64
        run: go build -buildmode=c-archive -buildvcs=false --tags fts5 -o "../app/native/darwin-arm64/libkernel.a" -ldflags "$BUILD_ARGS" ./cshared/
        working-directory: kernel
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: arm64
          CC: /usr/local/osxcross/bin/aarch64-apple-darwin25-cc

      - name: Build libkernel.dll windows/amd64 (c-shared + import lib)
        run: |
          OUTDIR=$(realpath ../app/native/windows-amd64)
          mkdir -p "$OUTDIR"
          go build -buildmode=c-shared -buildvcs=false --tags fts5 \
            -o "$OUTDIR/libkernel.dll" \
            -ldflags "$BUILD_ARGS -extldflags '-Wl,--output-def,$OUTDIR/libkernel.def,--out-implib,$OUTDIR/libkernel.lib'" \
            ./cshared/
        working-directory: kernel
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc

      - name: List built artifacts
        run: ls -lh app/native/*/

      - name: Upload kernel archives
        uses: actions/upload-artifact@v7
        with:
          name: kernel-libs
          retention-days: 1
          path: app/native/*/

  package-linux:
    needs: build-kernel
    runs-on: arc-runner-set
    container: node:latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download kernel archives
        uses: actions/download-artifact@v8
        with:
          name: kernel-libs
          path: app/native

      - name: Build UI
        run: |
          npm install -g ${{ github.event.inputs.packageManager }}
          pnpm install --no-frozen-lockfile
          pnpm run build
        working-directory: app

      - name: Build kernel.node for linux/amd64
        run: |
          cp linux-amd64/libkernel.h libkernel.h
          cp linux-amd64/libkernel.a libkernel.a
          npx node-gyp rebuild
        working-directory: app/native

      - name: Package Linux amd64
        run: pnpm run dist-linux
        working-directory: app

      - name: Install arm64 cross-compiler
        run: apt-get update && apt-get install -y crossbuild-essential-arm64

      - name: Build kernel.node for linux/arm64
        run: |
          cp linux-arm64/libkernel.h libkernel.h
          cp linux-arm64/libkernel.a libkernel.a
          CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ npx node-gyp rebuild --target_arch=arm64
        working-directory: app/native

      - name: Package Linux arm64
        run: pnpm run dist-linux-arm64
        working-directory: app

      - name: Upload Linux assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            app/build/siyuan-*-linux.tar.gz
            app/build/siyuan-*-linux.AppImage
            app/build/siyuan-*-linux.deb
            app/build/siyuan-*-linux-arm64.tar.gz
            app/build/siyuan-*-linux-arm64.AppImage
            app/build/siyuan-*-linux-arm64.deb

  package-macos:
    needs: build-kernel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download kernel archives
        uses: actions/download-artifact@v8
        with:
          name: kernel-libs
          path: app/native

      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Build UI
        run: |
          npm install -g ${{ github.event.inputs.packageManager }}
          pnpm install --no-frozen-lockfile
          pnpm run build
        working-directory: app

      - name: Build kernel.node for macOS Intel (static link)
        run: |
          cp darwin-amd64/libkernel.h libkernel.h
          cp darwin-amd64/libkernel.a libkernel.a
          npx node-gyp rebuild --target_arch=x64
        working-directory: app/native

      - name: Package macOS Intel
        run: pnpm run dist-darwin
        working-directory: app

      - name: Build kernel.node for macOS ARM64 (static link)
        run: |
          cp darwin-arm64/libkernel.h libkernel.h
          cp darwin-arm64/libkernel.a libkernel.a
          npx node-gyp rebuild --target_arch=arm64
        working-directory: app/native

      - name: Package macOS ARM64
        run: pnpm run dist-darwin-arm64
        working-directory: app

      - name: Upload macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            app/build/siyuan-*-mac.dmg
            app/build/siyuan-*-mac-arm64.dmg

  package-windows:
    needs: build-kernel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download kernel archives
        uses: actions/download-artifact@v8
        with:
          name: kernel-libs
          path: app/native

      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Build UI
        run: |
          npm install -g ${{ github.event.inputs.packageManager }}
          pnpm install --no-frozen-lockfile
          pnpm run build
        working-directory: app

      - name: Build kernel.node for Windows (MSVC + import lib)
        run: |
          cp windows-amd64/libkernel.h libkernel.h
          cp windows-amd64/libkernel.lib libkernel.lib
          npx node-gyp rebuild
          cp windows-amd64/libkernel.dll build/Release/
        shell: bash
        working-directory: app/native

      - name: Package Windows
        run: pnpm run dist
        working-directory: app

      - name: Upload Windows asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: app/build/siyuan-*-win.exe
