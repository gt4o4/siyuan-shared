name: release-android

on:
  workflow_dispatch:
    inputs:
      version:
        description: "release version/tag"
        required: true
      packageManager:
        description: "pnpm@x.x.x"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: arc-runner-set
    container: eclipse-temurin:17-jdk-jammy
    strategy:
      matrix:
        config:
          - os: arc-runner-set
            kernel_path: "../../../siyuan-android/app/libs/kernel.aar"

    defaults:
      run:
        shell: bash

    steps:
      - name: Install prerequisites
        run: apt-get update && apt-get install -y --no-install-recommends git wget curl zip sudo ca-certificates unzip

      - uses: actions/checkout@v6

      - name: Set workspace env
        run: echo "WORK=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: clone origin and apply patches
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/go
          cd ${GITHUB_WORKSPACE}/

          git clone --branch ${{ github.event.inputs.version }} --depth=1 https://github.com/siyuan-note/siyuan.git
          cd siyuan

          git apply ${GITHUB_WORKSPACE}/patches/siyuan/disable-update.patch
          git apply ${GITHUB_WORKSPACE}/patches/siyuan/default-config.patch
          git apply ${GITHUB_WORKSPACE}/patches/siyuan/mock-vip-user.patch

          git status

          cd ..

          git clone --branch ${{ github.event.inputs.version }} --depth=1 https://github.com/siyuan-note/siyuan-android.git
          cd siyuan-android

          git apply --ignore-whitespace --verbose ${GITHUB_WORKSPACE}/patches/siyuan-android/debug-build.patch

          mkdir -p app/src/main/assets/
          mkdir -p app/libs/

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.WORK }}/siyuan/kernel/go.mod
          cache-dependency-path: "**/*.sum"
      - run: go version

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Node pnpm
        run: npm install -g ${{ github.event.inputs.packageManager }}
        working-directory: ${{ env.WORK }}/siyuan/app

      - name: Install Node Dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: ${{ env.WORK }}/siyuan/app

      - name: Building UI
        run: pnpm run build
        working-directory: ${{ env.WORK }}/siyuan/app

      - name: Set up Android SDK and NDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm /tmp/cmdline-tools.zip
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "ndk;27.2.12479018" "platforms;android-36" "build-tools;36.0.0"
        env:
          ANDROID_HOME: /opt/android-sdk

      - name: gomobile
        working-directory: ${{ env.WORK }}/go
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/27.2.12479018

      - name: Building Android Kernel
        run: |
          gomobile bind --tags fts5 -androidapi 21 -target='android/arm64'  -ldflags '-s -w' -v -o "${{ matrix.config.kernel_path }}" ./
          ls -la "${{ matrix.config.kernel_path }}"
        working-directory: ${{ env.WORK }}/siyuan/kernel/mobile
        env:
          GO111MODULE: on
          CGO_ENABLED: 1
          ANDROID_HOME: /opt/android-sdk
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/27.2.12479018

      - name: android assets
        working-directory: ${{ env.WORK }}/siyuan/app/
        run: |
          zip -r ${GITHUB_WORKSPACE}/siyuan-android/app/src/main/assets/app.zip ./appearance ./guide ./stage ./changelogs

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: "siyuan.jks"
          fileDir: ${{ env.WORK }}/siyuan-android/keystore
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Building Android
        working-directory: ${{ env.WORK }}/siyuan-android
        run: |
          chmod 777 ./gradlew
          ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload Android APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: ${{ env.WORK }}/siyuan-android/app/build/outputs/apk/googleplay/release/siyuan-*.apk
